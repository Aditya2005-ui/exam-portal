{% extends "base.html" %}
{% block content %}

<h2>Select Test</h2>

{% for t in tests %}

<div class="card">

<b>{{t.test_name}}</b><br>

Duration: {{t.duration_minutes}} min

<a class="btn primary" href="{% url 'start_exam' t.id %}">Start</a>

</div>

{% endfor %}

<a href="{% url 'student_dashboard' %}">Back</a>

{% endblock %}
