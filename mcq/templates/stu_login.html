{% extends "base.html" %}
{% block content %}

<h2>Student Login</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="mob" placeholder="Mobile">
<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

</form>

<a href="{% url 'registration' %}">Register</a>

{% if error %}
<p style="color:red">{{error}}</p>
{% endif %}

{% endblock %}
