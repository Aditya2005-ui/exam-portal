{% extends "base.html" %}
{% block content %}

<h2>Questions</h2>

{% for q in questions %}

<div class="card">

<b>{{q.question}}</b>

<p>1) {{q.option1}}</p>
<p>2) {{q.option2}}</p>
<p>3) {{q.option3}}</p>
<p>4) {{q.option4}}</p>

<p>Correct: {{q.correct_option}}</p>

<a href="{% url 'edit_question' q.id %}">Edit</a>
<a href="{% url 'delete_question' q.id %}">Delete</a>

</div>

{% endfor %}

{% endblock %}
