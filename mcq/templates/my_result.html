{% extends "base.html" %}
{% block content %}

<h2>My Results</h2>

<table>

<tr>
<th>Test</th>
<th>Date</th>
<th>Total</th>
<th>Correct</th>
<th>Wrong</th>
<th>Score</th>
</tr>

{% for r in results %}

<tr>
<td>{{r.test.test_name}}</td>
<td>{{r.date_time}}</td>
<td>{{r.total_questions}}</td>
<td>{{r.correct_answers}}</td>
<td>{{r.wrong_answers}}</td>
<td>{{r.score}}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
